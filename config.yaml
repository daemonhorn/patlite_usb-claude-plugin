# Claude Code USB light plugin — configuration
# Edit this file to customize event -> light and sound signal mappings.
#
# Set driver to match your hardware; vid/pid are auto-detected from the driver
# and can be omitted unless you have a non-standard or clone device.
#
# Supported drivers and their default VID/PID:
#   patlite — Patlite NE-USB signal tower    VID 0x191A / PID 0x6001
#              Models: NE-WT-USB, NE-WN-USB, NE-ST-USB, NE-SN-USB
#   luxafor  — Luxafor Flag / Orb / Mute     VID 0x04D8 / PID 0xF372
#   blink1   — ThingM blink(1) mk1/mk2/mk3   VID 0x27B8 / PID 0x01ED

device:
  driver: patlite  # Options: patlite | luxafor | blink1
  # vid: 0x191A   # Uncomment to override VID (patlite default)
  # vid: 0x04D8   # Uncomment to override VID (luxafor default)
  # vid: 0x27B8   # Uncomment to override VID (blink1 default)
  # pid: 0x6001   # Uncomment to override PID (patlite default)
  # pid: 0xF372   # Uncomment to override PID (luxafor default)
  # pid: 0x01ED   # Uncomment to override PID (blink1 default)

# Event -> signal mapping
#
# LED colors:    red, amber, yellow, green, blue, cyan, purple, white, "off"
# LED patterns:  solid, flash, flash2, pulse, pulse2, pulse3, pulse4, "off"
#
# Buzzer sounds: "off", continuous, sweep, intermittent, weak, strong, star, london, keep
#   "off"         — silence the buzzer
#   continuous    — steady tone
#   sweep         — rising/falling sweep
#   intermittent  — short repeating beeps
#   weak          — soft caution chime
#   strong        — loud attention chime
#   star          — shining-star melody
#   london        — London Bridge melody
#   keep          — leave buzzer in its current state
#
# Volume:        "off" (mute), 1–10, keep
#   Applied only when buzzer is an active pattern; ignored when buzzer is "off" or "keep".
events:
  # Claude needs your attention (permission prompt, question)
  notification:
    color: amber
    pattern: flash
    buzzer: "off"
    volume: keep

  # Claude finished its turn, waiting for your next input
  stop:
    color: green
    pattern: solid
    buzzer: "off"
    volume: keep

  # You submitted a prompt — Claude is now working
  working:
    color: blue
    pattern: solid
    buzzer: "off"
    volume: keep

  # Claude is about to execute a tool
  pre_tool:
    color: cyan
    pattern: pulse
    buzzer: "off"
    volume: keep

  # Claude just finished a tool execution (still working)
  post_tool:
    color: blue
    pattern: solid
    buzzer: "off"
    volume: keep

  # Session ended — clear everything
  idle:
    color: "off"
    pattern: "off"
    buzzer: "off"
    volume: keep

# Touch sensor (NE-WT-USB / NE-ST-USB models only)
# When a Notification fires, a background listener waits for a touch event
# and injects Enter to confirm the highlighted option in Claude Code's
# permission prompt.
touch:
  enabled: false         # set true only for Patlite NE-WT-USB / NE-ST-USB (touch sensor models)
  approval_timeout: 30   # seconds to wait for touch after each notification
